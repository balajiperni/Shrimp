services:
  - type: web
    name: shrimp-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: CONFIDENCE_THRESHOLD
        value: "0.25"
    plan: free
